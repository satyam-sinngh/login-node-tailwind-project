<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Node JS</title>
     <link href="./output.css" rel="stylesheet">
</head>
<body class=" h-14 bg-linear-to-r from-cyan-500 to-blue-500 flex justify-center items-center min-h-screen">

        <h1 class="text-3xl text-white text-center font-bold mb-6  ">Login</h1>
        <form>
            <div class="mb-4 ">
                <label class="block text-sm font-medium  text-gray-200 mb-1 ">Email</label>
                <input class="bg-gray-500 w-full 
                 border-gray-700 border-2 text-white
                  px-3 py-1 rounded-md focus:outline-none 
                  " type="email" name="" placeholder="Email" id="">
            </div>
            <div class="mb-4 ">
                <label class="block text-sm font-medium  text-gray-200 mb-1" for="">Password</label>
                <input class="bg-gray-500 w-full 
                 border-gray-700 border-2 text-white
                  px-3 py-1 rounded-md focus:outline-none" type="password" name="" placeholder="Password" id="">
            </div>
            <button  class="w-full bg-blue-500 rounded-md py-1 text-white font-medium shadow-gray-900  shadow hover:bg-blue-700  cursor-pointer  " type="submit">Login</button>
        </form>
    </div>
